<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embed Demo | Duo Python Lab</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", sans-serif;
      color: #112;
      background: linear-gradient(130deg, #f6f8ff 0%, #d7fff8 100%);
      padding: 22px;
    }

    .wrap {
      max-width: 1300px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 18px;
      border: 1px solid rgba(17, 30, 60, 0.12);
      box-shadow: 0 18px 45px rgba(10, 20, 35, 0.16);
      overflow: hidden;
    }

    header {
      padding: 18px 20px;
      border-bottom: 1px solid rgba(17, 30, 60, 0.12);
      background: #0f1b2d;
      color: #e8f0ff;
    }

    header h1 {
      font-size: 1.35rem;
      margin-bottom: 8px;
    }

    header p {
      color: #b6c9ec;
    }

    .code {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(17, 30, 60, 0.12);
      background: #f8fbff;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.92rem;
      overflow-x: auto;
      white-space: pre;
    }

    .frame-box {
      width: 100%;
      height: min(85vh, 880px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Embed listo: Duo Python Lab</h1>
      <p>Esta pagina muestra como incrustar el Editor+Consola para que cualquiera pueda programar y probar Python en el navegador.</p>
    </header>

    <section class="code">&lt;iframe src="https://jr7juanito.github.io/jupyterlite-embed/duo/" width="100%" height="860" frameborder="0"&gt;&lt;/iframe&gt;</section>

    <section class="frame-box">
      <iframe src="./duo/" title="Duo Python Lab"></iframe>
    </section>
  </main>
</body>
</html>
