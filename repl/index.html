<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Py REPL Lite</title>
  <style>
    :root {
      --bg: #0b0f17;
      --panel: #121a28;
      --line: #1c2740;
      --text: #e8f0ff;
      --muted: #9db1d8;
      --accent: #23d5ab;
      --warn: #ffb020;
      --err: #ff6b7d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 10%, #1a2440 0%, var(--bg) 45%);
      color: var(--text);
      font-family: Consolas, "Courier New", monospace;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status { color: var(--muted); font-size: 0.9rem; }

    .btns { display: flex; gap: 8px; }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      font: inherit;
      cursor: pointer;
    }

    button:hover { border-color: var(--accent); }

    #out {
      margin: 0;
      padding: 14px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
    }

    .in {
      border-top: 1px solid var(--line);
      padding: 10px;
      background: rgba(0, 0, 0, 0.28);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
    }

    .prompt {
      color: var(--accent);
      font-weight: 700;
      user-select: none;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      background: #0f1625;
      color: var(--text);
      border-radius: 8px;
      padding: 9px 10px;
      font: inherit;
      outline: none;
    }

    input:focus { border-color: var(--accent); }

    .sys { color: var(--muted); }
    .err { color: var(--err); }
    .warn { color: var(--warn); }
  </style>
</head>
<body>
  <header>
    <div><strong>Py REPL Lite</strong> <span class="status" id="status">Inicializando...</span></div>
    <div class="btns">
      <button id="clear">Limpiar</button>
      <button id="reset">Reset runtime</button>
    </div>
  </header>

  <pre id="out"></pre>

  <div class="in">
    <span class="prompt">&gt;&gt;&gt;</span>
    <input id="cmd" autocomplete="off" placeholder="Escribe Python y presiona Enter" />
  </div>

  <script type="module">
    import { loadPyodide } from "https://cdn.jsdelivr.net/pyodide/v0.27.7/full/pyodide.mjs";

    const isEmbedded = new URLSearchParams(window.location.search).get("embedded") === "1";
    const out = document.getElementById("out");
    const cmd = document.getElementById("cmd");
    const status = document.getElementById("status");
    const clearBtn = document.getElementById("clear");
    const resetBtn = document.getElementById("reset");

    let pyodide;
    let bootPromise = null;
    let history = [];
    let histIx = -1;

    if (isEmbedded) {
      document.title = "Consola Pyodide Conectada";
    }

    function log(msg, cls = "") {
      const span = document.createElement("span");
      if (cls) span.className = cls;
      span.textContent = msg + "\n";
      out.appendChild(span);
      out.scrollTop = out.scrollHeight;
    }

    function notifyParent(message) {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(message, window.location.origin);
      }
    }

    async function boot() {
      status.textContent = "Cargando Pyodide...";
      status.className = "status warn";

      pyodide = await loadPyodide({
        indexURL: "https://cdn.jsdelivr.net/pyodide/v0.27.7/full/",
        stdout: (m) => log(m),
        stderr: (m) => log(m, "err")
      });

      await pyodide.runPythonAsync("import math, random, statistics");
      status.textContent = "Listo";
      status.className = "status";
      log("[system] Runtime listo. Modulos base: math, random, statistics", "sys");
      cmd.focus();
      notifyParent({ type: "duo-ready" });
    }

    async function ensureRuntime() {
      if (!bootPromise) {
        bootPromise = boot();
      }
      await bootPromise;
    }

    async function runBlock(code) {
      if (!code || !String(code).trim()) return;
      log(">>> [bloque editor]", "sys");

      try {
        const result = await pyodide.runPythonAsync(String(code));
        if (result !== undefined && result !== null) {
          log(String(result));
        }
        notifyParent({ type: "duo-exec-done", ok: true });
      } catch (e) {
        log(String(e), "err");
        notifyParent({ type: "duo-exec-done", ok: false });
      }
    }

    async function runLine(line) {
      if (!line.trim()) return;
      log(">>> " + line, "sys");

      try {
        const result = await pyodide.runPythonAsync(line);
        if (result !== undefined && result !== null) {
          log(String(result));
        }
      } catch (e) {
        log(String(e), "err");
      }
    }

    cmd.addEventListener("keydown", async (ev) => {
      if (ev.key === "Enter") {
        const line = cmd.value;
        history.push(line);
        histIx = history.length;
        cmd.value = "";
        await runLine(line);
      } else if (ev.key === "ArrowUp") {
        if (histIx > 0) {
          histIx -= 1;
          cmd.value = history[histIx] || "";
        }
        ev.preventDefault();
      } else if (ev.key === "ArrowDown") {
        if (histIx < history.length - 1) {
          histIx += 1;
          cmd.value = history[histIx] || "";
        } else {
          histIx = history.length;
          cmd.value = "";
        }
        ev.preventDefault();
      }
    });

    clearBtn.addEventListener("click", () => {
      out.textContent = "";
      log("[system] Consola limpia", "sys");
    });

    resetBtn.addEventListener("click", async () => {
      out.textContent = "";
      log("[system] Reiniciando runtime...", "warn");
      bootPromise = boot();
      await bootPromise;
      notifyParent({ type: "duo-reset-done" });
    });

    window.addEventListener("message", async (event) => {
      if (event.origin !== window.location.origin) return;
      const data = event.data || {};

      if (data.type === "duo-exec") {
        await ensureRuntime();
        await runBlock(data.code);
      } else if (data.type === "duo-clear") {
        out.textContent = "";
        log("[system] Consola limpia", "sys");
      } else if (data.type === "duo-reset") {
        out.textContent = "";
        log("[system] Reiniciando runtime...", "warn");
        bootPromise = boot();
        await bootPromise;
        notifyParent({ type: "duo-reset-done" });
      }
    });

    bootPromise = boot();
  </script>
</body>
</html>
