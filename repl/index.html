<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Py REPL Lite</title>
  <style>
    :root {
      --bg: #071019;
      --panel: #0e1622;
      --line: rgba(255, 255, 255, 0.18);
      --text: #b7ffb0;
      --muted: #7ddf78;
      --accent: #8cff7f;
      --warn: #d6ff7a;
      --err: #d7ffcf;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: Consolas, "Courier New", monospace;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
      overscroll-behavior: none;
    }

    header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status { color: var(--muted); font-size: 0.9rem; }

    .btns { display: flex; gap: 8px; }

    button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      font: inherit;
      cursor: pointer;
    }

    button:hover { border-color: rgba(255, 255, 255, 0.35); }

    #out {
      margin: 0;
      padding: 14px 16px;
      min-height: 0;
      overflow: auto;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      white-space: normal;
      word-break: normal;
      overflow-wrap: normal;
      line-height: 1.45;
      background: radial-gradient(circle at top, #0f1b2b 0%, var(--bg) 60%);
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x pan-y;
    }

    .line {
      display: grid;
      grid-template-columns: 4ch auto;
      gap: 10px;
      align-items: start;
      width: max-content;
      min-width: 100%;
      white-space: pre;
      flex: 0 0 auto;
    }

    .prompt-row {
      grid-template-columns: 4ch max-content auto;
      align-items: center;
      white-space: pre;
      width: max-content;
      min-width: max-content;
      padding-top: 0.1rem;
      padding-bottom: 0.1rem;
    }

    .live-input {
      display: inline-block;
      min-width: 1ch;
      outline: none;
      white-space: pre;
      caret-color: var(--accent);
      user-select: text;
      -webkit-user-select: text;
      word-break: normal;
      overflow-wrap: normal;
    }

    .live-input:empty::before {
      content: "";
    }

    .live-input::selection {
      background: rgba(140, 255, 127, 0.35);
      color: var(--text);
    }

    .prompt-row .payload {
      width: max-content;
      min-width: 0;
    }

    .banner {
      display: block;
      white-space: nowrap;
      word-break: normal;
      overflow-wrap: normal;
      width: max-content;
      min-width: max-content;
      flex: 0 0 auto;
      margin-bottom: 0.1rem;
    }

    .prefix {
      color: var(--accent);
      font-weight: 700;
      user-select: none;
      white-space: pre;
    }

    .payload {
      color: var(--text);
      white-space: pre;
      overflow-wrap: normal;
      min-width: max-content;
      min-height: 1.45em;
    }

    .sr-input {
      position: fixed;
      left: -10000px;
      top: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .prompt-row,
    .prompt-row * {
      cursor: text;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.10);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 10px;
      font: inherit;
      outline: none;
    }

    input::placeholder { color: rgba(255, 255, 255, 0.78); }

    input:focus { border-color: rgba(255, 255, 255, 0.45); }

    .sys { color: var(--text); }
    .err { color: var(--text); }
    .warn { color: var(--text); }
  </style>
</head>
<body>
  <header>
    <div><strong>Fiddleford H. McGucket</strong> <span class="status" id="status">Inicializando...</span></div>
    <div class="btns">
      <button id="clear">Limpiar terminal</button>
      <button id="reset">Reset runtime</button>
    </div>
  </header>

  <div id="out" aria-live="polite"></div>

  <input id="cmd" class="sr-input" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="text" aria-hidden="true" />

  <script type="module">
    import { loadPyodide } from "https://cdn.jsdelivr.net/pyodide/v0.27.7/full/pyodide.mjs";

    const isEmbedded = new URLSearchParams(window.location.search).get("embedded") === "1";
    const out = document.getElementById("out");
    const cmd = document.getElementById("cmd");
    const status = document.getElementById("status");
    const clearBtn = document.getElementById("clear");
    const resetBtn = document.getElementById("reset");

    let pyodide;
    let bootPromise = null;
    let history = [];
    let histIx = -1;
    let pythonVersion = "3.x.x";
    let currentBuffer = "";
    let promptRow = null;
    let promptText = null;

    if (isEmbedded) {
      document.title = "Consola Pyodide Conectada";
    }

    function appendBannerLine(msg) {
      const span = document.createElement("div");
      span.className = "banner";
      span.textContent = msg;
      insertBeforePrompt(span);
    }

    function appendPromptLine(prefix, msg, cls = "payload") {
      const row = document.createElement("div");
      row.className = "line";

      const prefixSpan = document.createElement("span");
      prefixSpan.className = "prefix";
      prefixSpan.textContent = prefix;

      const textSpan = document.createElement("span");
      textSpan.className = cls;
      textSpan.textContent = msg;

      row.appendChild(prefixSpan);
      row.appendChild(textSpan);
      insertBeforePrompt(row);
      scrollToBottom();
    }

    function syncEntry() {
      cmd.value = currentBuffer;
      if (promptText) promptText.textContent = currentBuffer;
      scrollToBottom();
    }

    function focusTerminal() {
      if (promptText) {
        promptText.focus({ preventScroll: true });
        requestAnimationFrame(() => {
          if (promptText) {
            placeCaretAtEnd(promptText);
          }
        });
      } else {
        cmd.focus({ preventScroll: true });
      }
    }

    function placeCaretAtEnd(element) {
      const selection = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(element);
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        out.scrollTop = out.scrollHeight;
      });
    }

    function ensurePromptRow() {
      if (!promptRow) {
        promptRow = document.createElement("div");
        promptRow.className = "prompt-row line";

        const prefixSpan = document.createElement("span");
        prefixSpan.className = "prefix";
        prefixSpan.textContent = ">>>";

        promptText = document.createElement("span");
        promptText.className = "payload live-input";
        promptText.contentEditable = "true";
        promptText.spellcheck = false;
        promptText.autocapitalize = "off";
        promptText.textContent = currentBuffer;

        promptRow.appendChild(prefixSpan);
        promptRow.appendChild(promptText);
        promptText.addEventListener("input", () => {
          currentBuffer = promptText.textContent || "";
          syncEntry();
        });
        promptText.addEventListener("focus", () => {
          scrollToBottom();
        });
        promptText.addEventListener("keydown", async (ev) => {
          if (ev.key === "Enter") {
            ev.preventDefault();
            const line = currentBuffer;
            if (!line.trim()) {
              currentBuffer = "";
              syncEntry();
              return;
            }
            history.push(line);
            histIx = history.length;
            appendInputLine(line);
            currentBuffer = "";
            syncEntry();
            await runLine(line);
          } else if (ev.key === "ArrowUp") {
            if (histIx > 0) {
              ev.preventDefault();
              histIx -= 1;
              currentBuffer = history[histIx] || "";
              syncEntry();
              placeCaretAtEnd(promptText);
            }
          } else if (ev.key === "ArrowDown") {
            if (histIx < history.length - 1) {
              ev.preventDefault();
              histIx += 1;
              currentBuffer = history[histIx] || "";
              syncEntry();
              placeCaretAtEnd(promptText);
            } else if (histIx >= history.length - 1) {
              ev.preventDefault();
              histIx = history.length;
              currentBuffer = "";
              syncEntry();
              placeCaretAtEnd(promptText);
            }
          }
        });
        promptText.addEventListener("pointerdown", () => {
          focusTerminal();
        });
      }

      if (!promptRow.isConnected) {
        out.appendChild(promptRow);
      }

      return promptRow;
    }

    function insertBeforePrompt(node) {
      ensurePromptRow();
      out.insertBefore(node, promptRow);
    }

    function appendInputLine(msg) {
      appendPromptLine(">>>", msg);
    }

    function appendOutput(msg) {
      appendPromptLine("...", msg);
    }

    function clearTerminal() {
      out.textContent = "";
      currentBuffer = "";
      syncEntry();
      history = [];
      histIx = -1;
      ensurePromptRow();
    }

    function renderInitialBanner() {
      appendBannerLine(`Python ${pythonVersion} (smartPato/TrustNoOne!:journal3, Jun 15 1982, 04:20:51)`);
      appendBannerLine("[MSC v.618 64-bit (JUNK64)] on file://Oregon/GravityFalls/MysteryShack/McGucketLaptop");
      appendBannerLine("[system] Runtime listo. Modulos base: math, random, statistics");
    }

    function notifyParent(message) {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(message, "*");
      }
    }

    async function boot() {
      status.textContent = "Cargando Pyodide...";
      status.className = "status warn";

      pyodide = await loadPyodide({
        indexURL: "https://cdn.jsdelivr.net/pyodide/v0.27.7/full/",
        stdout: (m) => appendOutput(m),
        stderr: (m) => appendOutput(m)
      });

        await pyodide.runPythonAsync(`
    import ast
    import builtins
    import inspect
    import sys
    import pydoc
    from pyodide_js import loadPackage as js_load_package

    _DUO_GLOBALS = {"__name__": "__main__"}
    _DUO_LOADED_PACKAGES = set()

    _DUO_PACKAGE_ALIASES = {
      "Bio": "biopython",
      "PIL": "pillow",
      "cv2": "opencv-python",
      "matplotlib": "matplotlib",
      "mpmath": "mpmath",
      "networkx": "networkx",
      "numpy": "numpy",
      "pandas": "pandas",
      "scipy": "scipy",
      "sklearn": "scikit-learn",
      "sympy": "sympy",
    }

    _DUO_SKIP_IMPORTS = {
      "__future__",
      "builtins",
      "collections",
      "contextlib",
      "dataclasses",
      "enum",
      "functools",
      "gc",
      "importlib",
      "inspect",
      "io",
      "itertools",
      "json",
      "math",
      "operator",
      "os",
      "pathlib",
      "pydoc",
      "random",
      "re",
      "statistics",
      "sys",
      "time",
      "types",
      "typing",
      "ast",
      "micropip",
      "pyodide_js",
      "js",
    }

    try:
      _DUO_SKIP_IMPORTS.update(sys.stdlib_module_names)
    except Exception:
      pass

    def _duo_import_roots(code):
      try:
        tree = ast.parse(code)
      except SyntaxError:
        return []

      roots = []
      for node in ast.walk(tree):
        if isinstance(node, ast.Import):
          for alias in node.names:
            roots.append(alias.name.split(".", 1)[0])
        elif isinstance(node, ast.ImportFrom) and node.module:
          roots.append(node.module.split(".", 1)[0])
      return roots

    def _duo_candidate_packages(module_name):
      candidates = []
      alias = _DUO_PACKAGE_ALIASES.get(module_name)
      if alias:
        candidates.append(alias)
      if module_name not in candidates:
        candidates.append(module_name)
      return candidates

    async def _duo_load_package(package_name):
      if package_name in _DUO_LOADED_PACKAGES:
        return

      try:
        await js_load_package(package_name)
        print(f"[auto] Loaded {package_name}")
        _DUO_LOADED_PACKAGES.add(package_name)
        return
      except Exception:
        pass

      await js_load_package("micropip")
      import micropip
      await micropip.install(package_name)
      print(f"[auto] Installed {package_name}")
      _DUO_LOADED_PACKAGES.add(package_name)

    async def _duo_prepare_imports(code):
      imports_to_try = []
      for root in _duo_import_roots(code):
        if root in _DUO_SKIP_IMPORTS:
          continue
        for candidate in _duo_candidate_packages(root):
          if candidate not in imports_to_try:
            imports_to_try.append(candidate)

      for package_name in imports_to_try:
        if package_name in sys.modules:
          continue
        await _duo_load_package(package_name)

    def _duo_exec(code):
      exec(code, _DUO_GLOBALS, _DUO_GLOBALS)

    async def _duo_exec_file(code):
      await _duo_prepare_imports(code)
      compiled = compile(code, "<duo>", "exec", flags=ast.PyCF_ALLOW_TOP_LEVEL_AWAIT)
      result = eval(compiled, _DUO_GLOBALS, _DUO_GLOBALS)
      if inspect.isawaitable(result):
        return await result

    async def _duo_run_line(code):
      await _duo_prepare_imports(code)
      return _duo_run(code)

    def _duo_run(code):
      tree = ast.parse(code, mode="exec")
      if not tree.body:
        return

      last_node = tree.body[-1]
      if isinstance(last_node, ast.Expr):
        temp_name = "__duo_expr_result__"
        tree.body[-1] = ast.Assign(
          targets=[ast.Name(id=temp_name, ctx=ast.Store())],
          value=last_node.value,
        )
        ast.fix_missing_locations(tree)
        exec(compile(tree, "<duo>", "exec"), _DUO_GLOBALS, _DUO_GLOBALS)
        if temp_name in _DUO_GLOBALS:
          result = _DUO_GLOBALS.pop(temp_name)
          if result is not None:
            print(repr(result))
      else:
        exec(code, _DUO_GLOBALS, _DUO_GLOBALS)

    def _duo_reset():
      _DUO_GLOBALS.clear()
      _DUO_GLOBALS["__name__"] = "__main__"

    def _duo_help(obj=None):
      if obj is None:
        print("help() no interactivo: usa help(obj) para ver la documentación.")
        return
      print(pydoc.render_doc(obj))

    builtins.help = _duo_help
    `);

import builtins

try:
  import numpy as np
except Exception:
  np = None

def _duo_is_max_heap(values):
  for index in range(len(values)):
    left = 2 * index + 1
    right = left + 1
    if left < len(values) and values[index] < values[left]:
      return False
    if right < len(values) and values[index] < values[right]:
      return False
  return True

def _duo_particion_ok(values, pivot, split):
  return split == sum(1 for value in values if value < pivot) and all(value < pivot for value in values[:split]) and all(value > pivot for value in values[split:])

async def _duo_run_mega_tests(code):
  ns = {"__name__": "__main__", "__builtins__": builtins.__dict__}
  if np is not None:

  capture = io.StringIO()

    await _duo_prepare_imports(code)

      exec(code, ns, ns)
  except Exception as exc:
    print(f"[setup] {type(exc).__name__}: {exc}")
    captured = capture.getvalue().strip()

  if capture.getvalue().strip():

  passed = 0
  failed = 0
  skipped = 0

  def record(name, status, detail=""):
    nonlocal passed, failed, skipped
    if status == "ok":
      passed += 1
      print(f"[OK] {name}")
    elif status == "skip":
      skipped += 1
      print(f"[SKIP] {name}: {detail}")
    else:
      failed += 1
      print(f"[FAIL] {name}: {detail}")

  def expect_equal(name, got, expected):
    if got == expected:
      record(name, "ok")
    else:
      record(name, "fail", f"esperado {expected!r}, obtuvo {got!r}")

  def expect_true(name, cond, detail="condición falsa"):

  def maybe_call(name, *args):

    if not callable(fn):
      record(name, "skip", "no definido")

    return fn(*args)

  # Capítulo 1
  if callable(ns.get("maximo")):

  if callable(ns.get("minmax")):

  else:

  if callable(ns.get("particionLomuto")):

    if isinstance(result, tuple) and len(result) == 3:

  else:
    record("cap1.particionLomuto", "skip", "no definido")

  if callable(ns.get("evalp")):

    expect_equal("cap1.busca.ok", maybe_call("busca", 28, matrix), (1, 2))
    expect_equal("cap1.busca.none", maybe_call("busca", 33, matrix), None)

    expect_equal("cap4.binterp.3", maybe_call("binterp", 16, array), -1)

  if callable(ns.get("Lista")):
    try:

  else:

  if callable(ns.get("Lista_doble_enlace")):

    async function ensureRuntime() {
      if (!bootPromise) {
        bootPromise = boot();
      }
      await bootPromise;
    }

    async function runBlock(code) {
      if (!code || !String(code).trim()) return;

      try {
        await ensureRuntime();
        pyodide.globals.set("__duo_code", String(code));
        const result = await pyodide.runPythonAsync("await _duo_exec_file(__duo_code)");
        pyodide.globals.delete("__duo_code");
        if (result !== undefined && result !== null) {
          appendOutput(String(result));
        }
        notifyParent({ type: "duo-exec-done", ok: true });
      } catch (e) {
        appendOutput(String(e));
        notifyParent({ type: "duo-exec-done", ok: false });
      }
    }

    async function runLine(line) {
      if (!line.trim()) return;
      await ensureRuntime();
      try {
        pyodide.globals.set("__duo_code", line);
        const result = await pyodide.runPythonAsync("await _duo_run_line(__duo_code)");
        pyodide.globals.delete("__duo_code");
        if (result !== undefined && result !== null) {
          appendOutput(String(result));
        }
      } catch (e) {
        appendOutput(String(e));
      }
    }

      await ensureRuntime();

      clearTerminal();
      renderInitialBanner();
      notifyParent({ type: "duo-reset-done" });
