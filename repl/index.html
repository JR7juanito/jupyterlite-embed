<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Py REPL Lite</title>
  <style>
    :root {
      --bg: #071019;
      --panel: #0e1622;
      --line: rgba(255, 255, 255, 0.18);
      --text: #b7ffb0;
      --muted: #7ddf78;
      --accent: #8cff7f;
      --warn: #d6ff7a;
      --err: #d7ffcf;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: Consolas, "Courier New", monospace;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
      overscroll-behavior: none;
    }

    header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status { color: var(--muted); font-size: 0.9rem; }

    .btns { display: flex; gap: 8px; }

    button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      font: inherit;
      cursor: pointer;
    }

    button:hover { border-color: rgba(255, 255, 255, 0.35); }

    #out {
      margin: 0;
      padding: 14px 16px;
      min-height: 0;
      overflow: auto;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      white-space: normal;
      word-break: normal;
      overflow-wrap: normal;
      line-height: 1.45;
      background: radial-gradient(circle at top, #0f1b2b 0%, var(--bg) 60%);
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x pan-y;
    }

    .line {
      display: grid;
      grid-template-columns: 4ch auto;
      gap: 10px;
      align-items: start;
      width: max-content;
      min-width: 100%;
      white-space: pre;
      flex: 0 0 auto;
    }

    .prompt-row {
      grid-template-columns: 4ch max-content auto;
      align-items: center;
      white-space: pre;
      width: max-content;
      min-width: max-content;
      padding-top: 0.1rem;
      padding-bottom: 0.1rem;
    }

    .live-input {
      display: inline-block;
      min-width: 1ch;
      outline: none;
      white-space: pre;
      caret-color: var(--accent);
      user-select: text;
      -webkit-user-select: text;
      word-break: normal;
      overflow-wrap: normal;
    }

    .live-input:empty::before {
      content: "";
    }

    .live-input::selection {
      background: rgba(140, 255, 127, 0.35);
      color: var(--text);
    }

    .prompt-row .payload {
      width: max-content;
      min-width: 0;
    }

    .banner {
      display: block;
      white-space: nowrap;
      word-break: normal;
      overflow-wrap: normal;
      width: max-content;
      min-width: max-content;
      flex: 0 0 auto;
      margin-bottom: 0.1rem;
    }

    .prefix {
      color: var(--accent);
      font-weight: 700;
      user-select: none;
      white-space: pre;
    }

    .payload {
      color: var(--text);
      white-space: pre;
      overflow-wrap: normal;
      min-width: max-content;
      min-height: 1.45em;
    }

    .sr-input {
      position: fixed;
      left: -10000px;
      top: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .prompt-row,
    .prompt-row * {
      cursor: text;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.10);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 10px;
      font: inherit;
      outline: none;
    }

    input::placeholder { color: rgba(255, 255, 255, 0.78); }

    input:focus { border-color: rgba(255, 255, 255, 0.45); }

    .sys { color: var(--text); }
    .err { color: var(--text); }
    .warn { color: var(--text); }
  </style>
</head>
<body>
  <header>
    <div><strong>Fiddleford H. McGucket</strong> <span class="status" id="status">Inicializando...</span></div>
    <div class="btns">
      <button id="clear">Limpiar terminal</button>
      <button id="reset">Reset runtime</button>
    </div>
  </header>

  <div id="out" aria-live="polite"></div>

  <input id="cmd" class="sr-input" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="text" aria-hidden="true" />

  <script type="module">
    import { loadPyodide } from "https://cdn.jsdelivr.net/pyodide/v0.27.7/full/pyodide.mjs";

    const isEmbedded = new URLSearchParams(window.location.search).get("embedded") === "1";
    const out = document.getElementById("out");
    const cmd = document.getElementById("cmd");
    const status = document.getElementById("status");
    const clearBtn = document.getElementById("clear");
    const resetBtn = document.getElementById("reset");

    let pyodide;
    let bootPromise = null;
    let history = [];
    let histIx = -1;
    let pythonVersion = "3.x.x";
    let currentBuffer = "";
    let promptRow = null;
    let promptText = null;

    if (isEmbedded) {
      document.title = "Consola Pyodide Conectada";
    }

    function appendBannerLine(msg) {
      const span = document.createElement("div");
      span.className = "banner";
      span.textContent = msg;
      insertBeforePrompt(span);
    }

    function appendPromptLine(prefix, msg, cls = "payload") {
      const row = document.createElement("div");
      row.className = "line";

      const prefixSpan = document.createElement("span");
      prefixSpan.className = "prefix";
      prefixSpan.textContent = prefix;

      const textSpan = document.createElement("span");
      textSpan.className = cls;
      textSpan.textContent = msg;

      row.appendChild(prefixSpan);
      row.appendChild(textSpan);
      insertBeforePrompt(row);
      scrollToBottom();
    }

    function syncEntry() {
      cmd.value = currentBuffer;
      if (promptText) promptText.textContent = currentBuffer;
      scrollToBottom();
    }

    function focusTerminal() {
      if (promptText) {
        promptText.focus({ preventScroll: true });
        requestAnimationFrame(() => {
          if (promptText) {
            placeCaretAtEnd(promptText);
          }
        });
      } else {
        cmd.focus({ preventScroll: true });
      }
    }

    function placeCaretAtEnd(element) {
      const selection = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(element);
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        out.scrollTop = out.scrollHeight;
      });
    }

    function ensurePromptRow() {
      if (!promptRow) {
        promptRow = document.createElement("div");
        promptRow.className = "prompt-row line";

        const prefixSpan = document.createElement("span");
        prefixSpan.className = "prefix";
        prefixSpan.textContent = ">>>";

        promptText = document.createElement("span");
        promptText.className = "payload live-input";
        promptText.contentEditable = "true";
        promptText.spellcheck = false;
        promptText.autocapitalize = "off";
        promptText.textContent = currentBuffer;

        promptRow.appendChild(prefixSpan);
        promptRow.appendChild(promptText);
        promptText.addEventListener("input", () => {
          currentBuffer = promptText.textContent || "";
          syncEntry();
        });
        promptText.addEventListener("focus", () => {
          scrollToBottom();
        });
        promptText.addEventListener("keydown", async (ev) => {
          if (ev.key === "Enter") {
            ev.preventDefault();
            const line = currentBuffer;
            if (!line.trim()) {
              currentBuffer = "";
              syncEntry();
              return;
            }
            history.push(line);
            histIx = history.length;
            appendInputLine(line);
            currentBuffer = "";
            syncEntry();
            await runLine(line);
          } else if (ev.key === "ArrowUp") {
            if (histIx > 0) {
              ev.preventDefault();
              histIx -= 1;
              currentBuffer = history[histIx] || "";
              syncEntry();
              placeCaretAtEnd(promptText);
            }
          } else if (ev.key === "ArrowDown") {
            if (histIx < history.length - 1) {
              ev.preventDefault();
              histIx += 1;
              currentBuffer = history[histIx] || "";
              syncEntry();
              placeCaretAtEnd(promptText);
            } else if (histIx >= history.length - 1) {
              ev.preventDefault();
              histIx = history.length;
              currentBuffer = "";
              syncEntry();
              placeCaretAtEnd(promptText);
            }
          }
        });
        promptText.addEventListener("pointerdown", () => {
          focusTerminal();
        });
      }

      if (!promptRow.isConnected) {
        out.appendChild(promptRow);
      }

      return promptRow;
    }

    function insertBeforePrompt(node) {
      ensurePromptRow();
      out.insertBefore(node, promptRow);
    }

    function appendInputLine(msg) {
      appendPromptLine(">>>", msg);
    }

    function appendOutput(msg) {
      appendPromptLine("...", msg);
    }

    function clearTerminal() {
      out.textContent = "";
      currentBuffer = "";
      syncEntry();
      history = [];
      histIx = -1;
      ensurePromptRow();
    }

    function renderInitialBanner() {
      appendBannerLine(`Python ${pythonVersion} (smartPato/TrustNoOne!:journal3, Jun 15 1982, 04:20:51)`);
      appendBannerLine("[MSC v.618 64-bit (JUNK64)] on file://Oregon/GravityFalls/MysteryShack/McGucketLaptop");
      appendBannerLine("[system] Runtime listo. Modulos base: math, random, statistics");
    }

    function notifyParent(message) {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(message, window.location.origin);
      }
    }

    async function boot() {
      status.textContent = "Cargando Pyodide...";
      status.className = "status warn";

      pyodide = await loadPyodide({
        indexURL: "https://cdn.jsdelivr.net/pyodide/v0.27.7/full/",
        stdout: (m) => appendOutput(m),
        stderr: (m) => appendOutput(m)
      });

        await pyodide.runPythonAsync(`
    import ast
    import builtins
    import pydoc

    _DUO_GLOBALS = {"__name__": "__main__"}

    def _duo_exec(code):
      exec(code, _DUO_GLOBALS, _DUO_GLOBALS)

    def _duo_run(code):
      tree = ast.parse(code, mode="exec")
      if not tree.body:
        return

      last_node = tree.body[-1]
      if isinstance(last_node, ast.Expr):
        temp_name = "__duo_expr_result__"
        tree.body[-1] = ast.Assign(
          targets=[ast.Name(id=temp_name, ctx=ast.Store())],
          value=last_node.value,
        )
        ast.fix_missing_locations(tree)
        exec(compile(tree, "<duo>", "exec"), _DUO_GLOBALS, _DUO_GLOBALS)
        if temp_name in _DUO_GLOBALS:
          result = _DUO_GLOBALS.pop(temp_name)
          if result is not None:
            print(repr(result))
      else:
        exec(code, _DUO_GLOBALS, _DUO_GLOBALS)

    def _duo_reset():
      _DUO_GLOBALS.clear()
      _DUO_GLOBALS["__name__"] = "__main__"

    def _duo_help(obj=None):
      if obj is None:
        print("help() no interactivo: usa help(obj) para ver la documentación.")
        return
      print(pydoc.render_doc(obj))

    builtins.help = _duo_help
    `);

        pythonVersion = await pyodide.runPythonAsync(`
import sys
f"{sys.version_info.major}.{sys.version_info.minor}.{sys.version_info.micro}"
`);

        await pyodide.runPythonAsync("import math, random, statistics");
      status.textContent = "";
      status.className = "status";
      clearTerminal();
      renderInitialBanner();
      focusTerminal();
      notifyParent({ type: "duo-ready" });
    }

    async function ensureRuntime() {
      if (!bootPromise) {
        bootPromise = boot();
      }
      await bootPromise;
    }

    async function runBlock(code) {
      if (!code || !String(code).trim()) return;

      appendInputLine(code);

      try {
        pyodide.globals.set("__duo_code", String(code));
        const result = await pyodide.runPythonAsync("_duo_run(__duo_code)");
        pyodide.globals.delete("__duo_code");
        if (result !== undefined && result !== null) {
          appendOutput(String(result));
        }
        notifyParent({ type: "duo-exec-done", ok: true });
      } catch (e) {
        appendOutput(String(e));
        notifyParent({ type: "duo-exec-done", ok: false });
      }
    }

    async function runLine(line) {
      if (!line.trim()) return;
      await ensureRuntime();
      try {
        pyodide.globals.set("__duo_code", line);
        const result = await pyodide.runPythonAsync("_duo_run(__duo_code)");
        pyodide.globals.delete("__duo_code");
        if (result !== undefined && result !== null) {
          appendOutput(String(result));
        }
      } catch (e) {
        appendOutput(String(e));
      }
    }

    async function resetSession() {
      await ensureRuntime();
      await pyodide.runPythonAsync("_duo_reset()");
      clearTerminal();
      renderInitialBanner();
      notifyParent({ type: "duo-reset-done" });
      focusTerminal();
    }

    out.addEventListener("pointerdown", () => {
      focusTerminal();
    });

    clearBtn.addEventListener("click", () => {
      clearTerminal();
      renderInitialBanner();
      focusTerminal();
    });

    resetBtn.addEventListener("click", async () => {
      await resetSession();
    });

    window.addEventListener("message", async (event) => {
      if (event.origin !== window.location.origin) return;
      const data = event.data || {};

      if (data.type === "duo-exec") {
        await ensureRuntime();
        await runBlock(data.code);
      } else if (data.type === "duo-clear") {
        clearTerminal();
        renderInitialBanner();
        focusTerminal();
      } else if (data.type === "duo-reset") {
        await resetSession();
      }
    });

    syncEntry();
    bootPromise = boot();
  </script>
</body>
</html>
