<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Py REPL Lite</title>
  <style>
    :root {
      --bg: #071019;
      --panel: #0e1622;
      --line: rgba(255, 255, 255, 0.18);
      --text: #b7ffb0;
      --muted: #7ddf78;
      --accent: #8cff7f;
      --warn: #d6ff7a;
      --err: #d7ffcf;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Consolas, "Courier New", monospace;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status { color: var(--muted); font-size: 0.9rem; }

    .btns { display: flex; gap: 8px; }

    button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      font: inherit;
      cursor: pointer;
    }

    button:hover { border-color: rgba(255, 255, 255, 0.35); }

    #out {
      margin: 0;
      padding: 14px 16px;
      overflow: auto;
      white-space: pre;
      word-break: normal;
      overflow-wrap: normal;
      line-height: 1.45;
      background: radial-gradient(circle at top, #0f1b2b 0%, var(--bg) 60%);
    }

    .in {
      border-top: 1px solid var(--line);
      padding: 10px;
      background: var(--panel);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
    }

    .prompt {
      color: var(--accent);
      font-weight: 700;
      user-select: none;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.10);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 10px;
      font: inherit;
      outline: none;
    }

    input::placeholder { color: rgba(255, 255, 255, 0.78); }

    input:focus { border-color: rgba(255, 255, 255, 0.45); }

    .sys { color: var(--text); }
    .err { color: var(--text); }
    .warn { color: var(--text); }
  </style>
</head>
<body>
  <header>
    <div><strong>Fiddleford H. McGucket</strong> <span class="status" id="status">Inicializando...</span></div>
    <div class="btns">
      <button id="clear">Limpiar terminal</button>
      <button id="reset">Reset runtime</button>
    </div>
  </header>

  <pre id="out"></pre>

  <div class="in">
    <span class="prompt">&gt;&gt;&gt;</span>
    <input id="cmd" autocomplete="off" placeholder="Escribe Python y presiona Enter" />
  </div>

  <script type="module">
    import { loadPyodide } from "https://cdn.jsdelivr.net/pyodide/v0.27.7/full/pyodide.mjs";

    const isEmbedded = new URLSearchParams(window.location.search).get("embedded") === "1";
    const out = document.getElementById("out");
    const cmd = document.getElementById("cmd");
    const status = document.getElementById("status");
    const clearBtn = document.getElementById("clear");
    const resetBtn = document.getElementById("reset");

    let pyodide;
    let bootPromise = null;
    let history = [];
    let histIx = -1;
    let pythonVersion = "3.x.x";

    if (isEmbedded) {
      document.title = "Consola Pyodide Conectada";
    }

    function log(msg, cls = "") {
      const span = document.createElement("span");
      if (cls) span.className = cls;
      span.textContent = `... ${msg}\n`;
      out.appendChild(span);
      out.scrollTop = out.scrollHeight;
    }

    function clearTerminal() {
      out.textContent = "";
      cmd.value = "";
      history = [];
      histIx = -1;
    }

    function renderInitialBanner() {
      log(`Python ${pythonVersion} (smartPato/TrustNoOne!:journal3, Jun 15 1982, 04:20:51)`);
      log("[MSC v.618 64-bit (JUNK64)] on file://Oregon/GravityFalls/MysteryShack/McGucketLaptop");
      log("[system] Runtime listo. Modulos base: math, random, statistics");
    }

    function notifyParent(message) {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(message, window.location.origin);
      }
    }

    async function boot() {
      status.textContent = "Cargando Pyodide...";
      status.className = "status warn";

      pyodide = await loadPyodide({
        indexURL: "https://cdn.jsdelivr.net/pyodide/v0.27.7/full/",
        stdout: (m) => log(m),
        stderr: (m) => log(m, "err")
      });

        await pyodide.runPythonAsync(`
    _DUO_GLOBALS = {"__name__": "__main__"}

    def _duo_exec(code):
      exec(code, _DUO_GLOBALS, _DUO_GLOBALS)

    def _duo_reset():
      _DUO_GLOBALS.clear()
      _DUO_GLOBALS["__name__"] = "__main__"
    `);

        pythonVersion = await pyodide.runPythonAsync(`
import sys
f"{sys.version_info.major}.{sys.version_info.minor}.{sys.version_info.micro}"
`);

        await pyodide.runPythonAsync("import math, random, statistics");
      status.textContent = "";
      status.className = "status";
      clearTerminal();
      renderInitialBanner();
      cmd.focus();
      notifyParent({ type: "duo-ready" });
    }

    async function ensureRuntime() {
      if (!bootPromise) {
        bootPromise = boot();
      }
      await bootPromise;
    }

    async function runBlock(code) {
      if (!code || !String(code).trim()) return;

      try {
        pyodide.globals.set("__duo_code", String(code));
        const result = await pyodide.runPythonAsync("_duo_exec(__duo_code)");
        pyodide.globals.delete("__duo_code");
        if (result !== undefined && result !== null) {
          log(String(result));
        }
        notifyParent({ type: "duo-exec-done", ok: true });
      } catch (e) {
        log(String(e));
        notifyParent({ type: "duo-exec-done", ok: false });
      }
    }

    async function runLine(line) {
      if (!line.trim()) return;
      await ensureRuntime();
      log(">>> " + line, "sys");

      try {
        pyodide.globals.set("__duo_code", line);
        const result = await pyodide.runPythonAsync("_duo_exec(__duo_code)");
        pyodide.globals.delete("__duo_code");
        if (result !== undefined && result !== null) {
          log(String(result));
        }
      } catch (e) {
        log(String(e));
      }
    }

    async function resetSession() {
      await ensureRuntime();
      await pyodide.runPythonAsync("_duo_reset()");
      clearTerminal();
      renderInitialBanner();
      notifyParent({ type: "duo-reset-done" });
      cmd.focus();
    }

    cmd.addEventListener("keydown", async (ev) => {
      if (ev.key === "Enter") {
        const line = cmd.value;
        history.push(line);
        histIx = history.length;
        cmd.value = "";
        await runLine(line);
      } else if (ev.key === "ArrowUp") {
        if (histIx > 0) {
          histIx -= 1;
          cmd.value = history[histIx] || "";
        }
        ev.preventDefault();
      } else if (ev.key === "ArrowDown") {
        if (histIx < history.length - 1) {
          histIx += 1;
          cmd.value = history[histIx] || "";
        } else {
          histIx = history.length;
          cmd.value = "";
        }
        ev.preventDefault();
      }
    });

    clearBtn.addEventListener("click", () => {
      clearTerminal();
      renderInitialBanner();
      cmd.focus();
    });

    resetBtn.addEventListener("click", async () => {
      await resetSession();
    });

    window.addEventListener("message", async (event) => {
      if (event.origin !== window.location.origin) return;
      const data = event.data || {};

      if (data.type === "duo-exec") {
        await ensureRuntime();
        await runBlock(data.code);
      } else if (data.type === "duo-clear") {
        clearTerminal();
        renderInitialBanner();
        cmd.focus();
      } else if (data.type === "duo-reset") {
        await resetSession();
      }
    });

    bootPromise = boot();
  </script>
</body>
</html>
