name: Build and Deploy JupyterLite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install JupyterLite
        run: |
          python -m pip install --upgrade pip
          pip install "jupyterlite-core==0.8.0" "jupyterlite-pyodide-kernel==0.8.0"
          pip install "jupyter-server>=2.0" "jupyterlab-server>=2.27"

      - name: Build JupyterLite
        run: |
          jupyter lite build --ignore-sys-prefix --contents content --output-dir _output

      - name: Include AcuarioProyect static app
        run: |
          mkdir -p _output/AcuarioProyect
          cp -r AcuarioProyect/. _output/AcuarioProyect/

      - name: Include Duo Editor + Console app
        run: |
          mkdir -p _output/duo
          cp -r duo/. _output/duo/
          cp duo-embed-example.html _output/duo-embed-example.html

      - name: Override REPL with stable Pyodide page
        run: |
          mkdir -p _output/repl
          cp repl/index.html _output/repl/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
