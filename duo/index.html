<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duo Python: Editor + Consola Real</title>
  <style>
    :root {
      --bg: #0b1d3a;
      --panel: #0f1e36;
      --line: #243a63;
      --text: #e8f0ff;
      --muted: #9db1d8;
      --accent: #1d5fe0;
      --accent-2: #0da574;
      --danger: #d63b56;
      --parchment-base: #ecd38e;
      --parchment-light: #f7e7ad;
      --parchment-shadow: rgba(128, 88, 26, 0.18);
      --parchment-ink: #2f2517;
      --parchment-muted: #6b5639;
      --parchment-border: #cfb06d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #0b1d3a;
      color: var(--text);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .status {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px;
      min-height: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 0;
    }

    .panel-head {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      font-size: 0.9rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btns {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line);
      background: #132745;
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      font: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .btns button {
      background: #132745;
      border-color: #2b416b;
      color: var(--text);
    }

    .btns button:hover {
      background: #183052;
      border-color: #3a5688;
    }

    .run {
      border-color: #3a5688;
    }

    #editor {
      width: 100%;
      height: 100%;
      min-height: 0;
      position: relative;
      display: block;
      box-shadow: 2px 3px 20px black, 0 0 60px #8a4d0f inset;
      background: transparent;
      overflow: hidden;
    }

    #editor .parchment-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: #fffef0;
      box-shadow: inset 0 0 60px #8a4d0f;
      filter: url(#wavy2);
    }

    #editor .parchment-layer::before,
    #editor .parchment-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #editor .parchment-layer::before {
      background:
        radial-gradient(circle at 18% 10%, rgba(255, 255, 255, 0.55) 0 9%, transparent 18%),
        radial-gradient(circle at 24% 18%, rgba(197, 149, 72, 0.18) 0 7%, transparent 15%),
        radial-gradient(circle at 58% 14%, rgba(255, 250, 225, 0.42) 0 10%, transparent 20%),
        radial-gradient(circle at 83% 18%, rgba(164, 117, 53, 0.15) 0 8%, transparent 18%),
        radial-gradient(circle at 82% 82%, rgba(143, 94, 35, 0.22) 0 14%, transparent 28%),
        radial-gradient(circle at 10% 90%, rgba(145, 95, 34, 0.20) 0 12%, transparent 26%);
      mix-blend-mode: multiply;
      opacity: 0.9;
    }

    #editor .parchment-layer::after {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.02) 28%, rgba(111, 76, 24, 0.06) 100%),
        radial-gradient(ellipse at top left, rgba(121, 85, 30, 0.16) 0 18%, transparent 44%),
        radial-gradient(ellipse at top right, rgba(121, 84, 30, 0.16) 0 16%, transparent 42%),
        radial-gradient(ellipse at bottom left, rgba(118, 80, 25, 0.22) 0 16%, transparent 46%),
        radial-gradient(ellipse at bottom right, rgba(118, 80, 25, 0.24) 0 18%, transparent 48%);
      box-shadow: inset 0 0 30px rgba(122, 84, 26, 0.10);
    }

    #editorSurface {
      position: absolute;
      inset: 18px 18px 22px 18px;
      z-index: 1;
      min-width: 0;
      min-height: 0;
      background: transparent;
    }

    #editorSurface .monaco-editor,
    #editorSurface .monaco-editor-background,
    #editorSurface .overflow-guard,
    #editorSurface .monaco-scrollable-element,
    #editorSurface .margin,
    #editorSurface .inputarea,
    #editorSurface .monaco-editor .view-overlays,
    #editorSurface .monaco-editor .view-lines {
      background: transparent !important;
    }

    #editorSurface .monaco-editor .lines-content,
    #editorSurface .monaco-editor .view-lines,
    #editorSurface .monaco-editor .view-line,
    #editorSurface .monaco-editor .view-line span {
      font-family: Consolas, "Courier New", monospace !important;
    }

    #editorSurface .monaco-editor,
    #editorSurface .monaco-editor .overflow-guard,
    #editorSurface .monaco-editor .monaco-scrollable-element {
      outline: none !important;
      box-shadow: none !important;
    }

    #editorSurface .monaco-editor.focused,
    #editorSurface .monaco-editor.focused .overflow-guard,
    #editorSurface .monaco-editor.focused .monaco-scrollable-element {
      outline: none !important;
      box-shadow: none !important;
    }

    #editorSurface .monaco-editor .current-line,
    #editorSurface .monaco-editor .view-overlays .current-line,
    #editorSurface .monaco-editor .line-highlight {
      background: transparent !important;
      border: 0 !important;
    }

    #editorSurface .monaco-editor .line-numbers {
      color: rgba(71, 57, 36, 0.62) !important;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #0b162b;
    }

    .note {
      border-top: 1px solid var(--line);
      padding: 8px 10px;
      font-size: 0.85rem;
      color: var(--muted);
      background: #112445;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .panel { min-height: 58vh; }
    }
  </style>
</head>
<body>
  <svg aria-hidden="true" focusable="false" width="0" height="0" style="position:absolute;left:-9999px;top:-9999px;overflow:hidden;">
    <filter id="wavy2">
      <feTurbulence x="0" y="0" baseFrequency="0.02" numOctaves="5" seed="1"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" scale="20" />
    </filter>
  </svg>

  <header>
    <h1>Duo Python Real: Editor + Consola</h1>
    <div class="status" id="status">Inicializando Python local...</div>
  </header>

  <main class="layout">
    <section class="panel">
      <div class="panel-head">
        <span>Editor (multiplataforma)</span>
        <div class="btns">
          <button class="run" id="runBtn">Ejecutar</button>
          <button id="importBtn">Importar</button>
          <button id="pasteBtn">Pegar</button>
          <button id="clearBtn">Limpiar hoja</button>
        </div>
      </div>
      <div id="editor" aria-label="Editor de Python">
        <div class="parchment-layer" aria-hidden="true"></div>
        <div id="editorSurface"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <span>Consola Pyodide conectada (real)</span>
      </div>
      <iframe id="consoleFrame" title="Consola Pyodide conectada" src="../repl/index.html?embedded=1"></iframe>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
  <script type="module">
    const editorRoot = document.getElementById("editorSurface");
    const status = document.getElementById("status");
    const runBtn = document.getElementById("runBtn");
    const importBtn = document.getElementById("importBtn");
    const pasteBtn = document.getElementById("pasteBtn");
    const clearBtn = document.getElementById("clearBtn");
    const consoleFrame = document.getElementById("consoleFrame");
    const importInput = document.createElement("input");

    const bridgeOrigin = window.location.origin;
    let consoleReady = false;
    let monacoEditor = null;
    const pendingMessages = [];

    importInput.type = "file";
    importInput.accept = ".py,.txt,.md,text/plain";
    importInput.style.display = "none";
    document.body.appendChild(importInput);

    const starterCode = `"""
Entorno interactivo para redactar y ejecutar Python en el navegador.
Escriba, pruebe e itere sin guardar archivos.
"""`;

    function setupEditor() {
      return new Promise((resolve) => {
        window.require.config({
          paths: {
            vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs"
          }
        });

        window.require(["vs/editor/editor.main"], () => {
          window.monaco.editor.defineTheme("duo-parchment", {
            base: "vs",
            inherit: true,
            rules: [
              { token: "comment", foreground: "8a734d", fontStyle: "italic" },
              { token: "keyword", foreground: "7a2b10", fontStyle: "bold" },
              { token: "number", foreground: "9a5d12" },
              { token: "string", foreground: "0f6a45" },
              { token: "delimiter", foreground: "6b5534" },
              { token: "type.identifier", foreground: "2e5b96" },
              { token: "identifier", foreground: "2f2517" }
            ],
            colors: {
              "editor.background": "#ecd38e",
              "editor.foreground": "#2f2517",
              "editorLineNumber.foreground": "#8f7952",
              "editorLineNumber.activeForeground": "#5f4b2f",
              "editorCursor.foreground": "#2f2517",
              "editor.selectionBackground": "#d7bc76",
              "editor.inactiveSelectionBackground": "#eadfae",
              "editor.lineHighlightBackground": "#00000000",
              "editor.lineHighlightBorder": "#00000000",
              "editorIndentGuide.background1": "#cab07a",
              "editorIndentGuide.activeBackground1": "#b19254",
              "scrollbar.shadow": "#00000000",
              "scrollbarSlider.background": "#9b824f66",
              "scrollbarSlider.hoverBackground": "#8c744c88",
              "scrollbarSlider.activeBackground": "#7f684899"
            }
          });

          monacoEditor = window.monaco.editor.create(editorRoot, {
            value: starterCode,
            language: "python",
            theme: "duo-parchment",
            automaticLayout: true,
            minimap: { enabled: false },
            fontFamily: "Consolas, 'Courier New', monospace",
            fontSize: 14,
            lineNumbers: "on",
            roundedSelection: false,
            scrollBeyondLastLine: false,
            wordWrap: "off",
            tabSize: 4,
            insertSpaces: true,
            glyphMargin: false,
            folding: false,
            renderLineHighlight: "none",
            padding: { top: 12, bottom: 8, left: 18, right: 18 },
            lineDecorationsWidth: 14,
            lineNumbersMinChars: 3,
            scrollBeyondLastColumn: 8,
            scrollbar: {
              vertical: "auto",
              horizontal: "auto",
              verticalScrollbarSize: 12,
              horizontalScrollbarSize: 12,
              alwaysConsumeMouseWheel: false,
              useShadows: true
            }
          });

          resolve();
        });
      });
    }

    function flushPendingMessages() {
      if (!consoleReady || !consoleFrame.contentWindow) return;

      while (pendingMessages.length > 0) {
        const msg = pendingMessages.shift();
        consoleFrame.contentWindow.postMessage(msg, bridgeOrigin);
      }
    }

    function sendToConsole(message) {
      if (!consoleFrame.contentWindow) {
        status.textContent = "Consola no disponible";
        return false;
      }

      if (!consoleReady) {
        pendingMessages.push(message);
        return true;
      }

      consoleFrame.contentWindow.postMessage(message, bridgeOrigin);
      return true;
    }

    async function runCode() {
      if (!monacoEditor) return;
      const code = monacoEditor.getValue();
      if (!code.trim()) return;

      if (!consoleReady) {
        status.textContent = "Esperando consola...";
      }

      const ok = sendToConsole({ type: "duo-exec", code });
      if (ok) {
        status.textContent = "Bloque enviado a la consola";
      }
    }

    window.addEventListener("message", (event) => {
      if (event.origin !== bridgeOrigin) return;
      const data = event.data || {};

      if (data.type === "duo-ready") {
        consoleReady = true;
        flushPendingMessages();
        status.textContent = "Consola conectada";
      } else if (data.type === "duo-exec-done") {
        status.textContent = data.ok ? "Ejecucion completada" : "Error en consola";
      } else if (data.type === "duo-reset-done") {
        status.textContent = "Runtime reiniciado";
      }
    });

    runBtn.addEventListener("click", runCode);
    importBtn.addEventListener("click", () => importInput.click());
    importInput.addEventListener("change", async () => {
      if (!monacoEditor || !importInput.files || !importInput.files.length) return;

      const file = importInput.files[0];
      const text = await file.text();
      monacoEditor.setValue(text);
      monacoEditor.focus();
      status.textContent = `Importado: ${file.name}`;
      importInput.value = "";
    });

    pasteBtn.addEventListener("click", async () => {
      if (!monacoEditor) return;

      try {
        const text = await navigator.clipboard.readText();
        const selection = monacoEditor.getSelection();
        monacoEditor.executeEdits("paste-from-clipboard", [{
          range: selection,
          text,
          forceMoveMarkers: true
        }]);
        monacoEditor.focus();
        status.textContent = text ? "Pegado en el editor" : "Portapapeles vacio";
      } catch (error) {
        status.textContent = "No se pudo pegar";
      }
    });
    clearBtn.addEventListener("click", () => {
      if (!monacoEditor) return;
      monacoEditor.setValue("");
      monacoEditor.focus();
      status.textContent = "Hoja limpia";
    });

    window.addEventListener("keydown", async (e) => {
      if (e.ctrlKey && e.key === "Enter") {
        e.preventDefault();
        await runCode();
      }
    });

    status.textContent = "Cargando editor...";
    await setupEditor();
    status.textContent = "Esperando consola...";
  </script>
</body>
</html>
