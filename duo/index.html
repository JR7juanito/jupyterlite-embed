<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duo Python: Editor + Consola Real</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --line: #d8dfef;
      --text: #16213d;
      --muted: #5c6f96;
      --accent: #1d5fe0;
      --accent-2: #0da574;
      --danger: #d63b56;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .status {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px;
      min-height: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 0;
    }

    .panel-head {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      font-size: 0.9rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btns {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      font: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .run {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .secondary {
      background: var(--accent-2);
      border-color: var(--accent-2);
      color: #fff;
    }

    .danger {
      background: var(--danger);
      border-color: var(--danger);
      color: #fff;
    }

    #editor {
      width: 100%;
      height: 100%;
      border: 0;
      outline: none;
      resize: none;
      padding: 12px;
      font: 14px/1.45 Consolas, "Courier New", monospace;
      color: #0f234f;
      background: #fcfdff;
    }

    #output {
      margin: 0;
      border-top: 1px solid var(--line);
      background: #0e172b;
      color: #e9f1ff;
      padding: 10px;
      min-height: 130px;
      max-height: 210px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font: 13px/1.4 Consolas, "Courier New", monospace;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .note {
      border-top: 1px solid var(--line);
      padding: 8px 10px;
      font-size: 0.85rem;
      color: var(--muted);
      background: #f8faff;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .panel { min-height: 58vh; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Duo Python Real: Editor + Consola</h1>
    <div class="status" id="status">Inicializando Python local...</div>
  </header>

  <main class="layout">
    <section class="panel">
      <div class="panel-head">
        <span>Editor (multiplataforma)</span>
        <div class="btns">
          <button class="run" id="runBtn">Ejecutar</button>
          <button class="secondary" id="copyBtn">Copiar</button>
          <button id="clearBtn">Limpiar salida</button>
          <button class="danger" id="resetBtn">Reset runtime</button>
        </div>
      </div>
      <textarea id="editor" spellcheck="false">import math
import random

print("Hola desde Python real (Pyodide)")
print("sqrt(81) =", math.sqrt(81))
print("random 1..10 =", random.randint(1, 10))</textarea>
      <pre id="output">Cargando runtime...</pre>
    </section>

    <section class="panel">
      <div class="panel-head">
        <span>Consola oficial JupyterLite (real)</span>
        <div class="btns">
          <button id="openConsoleBtn">Abrir en pestaña</button>
        </div>
      </div>
      <iframe id="consoleFrame" title="Consola oficial JupyterLite" src="../consoles/index.html"></iframe>
      <div class="note">Si no carga, abre directamente: /consoles/index.html</div>
    </section>
  </main>

  <script type="module">
    import { loadPyodide } from "https://cdn.jsdelivr.net/pyodide/v0.27.7/full/pyodide.mjs";

    const editor = document.getElementById("editor");
    const output = document.getElementById("output");
    const status = document.getElementById("status");
    const runBtn = document.getElementById("runBtn");
    const copyBtn = document.getElementById("copyBtn");
    const clearBtn = document.getElementById("clearBtn");
    const resetBtn = document.getElementById("resetBtn");
    const openConsoleBtn = document.getElementById("openConsoleBtn");
    const consoleFrame = document.getElementById("consoleFrame");

    let pyodide;

    function write(text, kind = "") {
      const line = document.createElement("span");
      if (kind === "err") line.style.color = "#ff9aad";
      if (kind === "sys") line.style.color = "#a5bbdf";
      line.textContent = text + "\n";
      output.appendChild(line);
      output.scrollTop = output.scrollHeight;
    }

    function clearOutput() {
      output.textContent = "";
    }

    async function initRuntime() {
      runBtn.disabled = true;
      status.textContent = "Inicializando Python local...";
      clearOutput();

      pyodide = await loadPyodide({
        indexURL: "https://cdn.jsdelivr.net/pyodide/v0.27.7/full/",
        stdout: (m) => write(m),
        stderr: (m) => write(m, "err")
      });

      await pyodide.runPythonAsync("import math, random, statistics");
      status.textContent = "Python listo";
      write("[system] Runtime listo", "sys");
      runBtn.disabled = false;
    }

    async function runCode() {
      if (!pyodide) return;
      const code = editor.value;
      if (!code.trim()) return;

      runBtn.disabled = true;
      status.textContent = "Ejecutando...";
      write("[system] Ejecutando bloque", "sys");

      try {
        const result = await pyodide.runPythonAsync(code);
        if (result !== undefined && result !== null) {
          write(String(result));
        }
      } catch (err) {
        write(String(err), "err");
      } finally {
        status.textContent = "Python listo";
        runBtn.disabled = false;
      }
    }

    runBtn.addEventListener("click", runCode);
    clearBtn.addEventListener("click", clearOutput);
    resetBtn.addEventListener("click", initRuntime);
    copyBtn.addEventListener("click", async () => {
      await navigator.clipboard.writeText(editor.value);
      status.textContent = "Codigo copiado";
      setTimeout(() => { status.textContent = "Python listo"; }, 1200);
    });

    openConsoleBtn.addEventListener("click", () => {
      window.open(consoleFrame.src, "_blank", "noopener,noreferrer");
    });

    window.addEventListener("keydown", async (e) => {
      if (e.ctrlKey && e.key === "Enter") {
        e.preventDefault();
        await runCode();
      }
    });

    initRuntime();
  </script>
</body>
</html>
