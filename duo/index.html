<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duo Python: Editor + Consola Real</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --line: #d8dfef;
      --text: #16213d;
      --muted: #5c6f96;
      --accent: #1d5fe0;
      --accent-2: #0da574;
      --danger: #d63b56;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .status {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px;
      min-height: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 0;
    }

    .panel-head {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      font-size: 0.9rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btns {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      font: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .run {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .secondary {
      background: var(--accent-2);
      border-color: var(--accent-2);
      color: #fff;
    }

    .danger {
      background: var(--danger);
      border-color: var(--danger);
      color: #fff;
    }

    #editor {
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    #output {
      margin: 0;
      border-top: 1px solid var(--line);
      background: #0e172b;
      color: #e9f1ff;
      padding: 10px;
      min-height: 130px;
      max-height: 210px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font: 13px/1.4 Consolas, "Courier New", monospace;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .note {
      border-top: 1px solid var(--line);
      padding: 8px 10px;
      font-size: 0.85rem;
      color: var(--muted);
      background: #f8faff;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .panel { min-height: 58vh; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Duo Python Real: Editor + Consola</h1>
    <div class="status" id="status">Inicializando Python local...</div>
  </header>

  <main class="layout">
    <section class="panel">
      <div class="panel-head">
        <span>Editor (multiplataforma)</span>
        <div class="btns">
          <button class="run" id="runBtn">Ejecutar</button>
          <button class="secondary" id="copyBtn">Copiar</button>
          <button id="clearBtn">Limpiar consola</button>
          <button class="danger" id="resetBtn">Reset runtime</button>
        </div>
      </div>
      <div id="editor" aria-label="Editor de Python"></div>
      <div class="note">Ejecutar envía el codigo del editor al panel derecho (consola conectada).</div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <span>Consola Pyodide conectada (real)</span>
        <div class="btns">
          <button id="openConsoleBtn">Abrir en pestaña</button>
        </div>
      </div>
      <iframe id="consoleFrame" title="Consola Pyodide conectada" src="../repl/index.html?embedded=1"></iframe>
      <div class="note">Esta consola recibe codigo del editor por mensaje en tiempo real.</div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
  <script type="module">
    const editorRoot = document.getElementById("editor");
    const status = document.getElementById("status");
    const runBtn = document.getElementById("runBtn");
    const copyBtn = document.getElementById("copyBtn");
    const clearBtn = document.getElementById("clearBtn");
    const resetBtn = document.getElementById("resetBtn");
    const openConsoleBtn = document.getElementById("openConsoleBtn");
    const consoleFrame = document.getElementById("consoleFrame");

    const bridgeOrigin = window.location.origin;
    let consoleReady = false;
    let monacoEditor = null;

    const starterCode = `import math
import random

print("Hola desde Python real (Pyodide)")
print("sqrt(81) =", math.sqrt(81))
print("random 1..10 =", random.randint(1, 10))`;

    function setupEditor() {
      return new Promise((resolve) => {
        window.require.config({
          paths: {
            vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs"
          }
        });

        window.require(["vs/editor/editor.main"], () => {
          monacoEditor = window.monaco.editor.create(editorRoot, {
            value: starterCode,
            language: "python",
            theme: "vs-dark",
            automaticLayout: true,
            minimap: { enabled: false },
            fontFamily: "Consolas, 'Courier New', monospace",
            fontSize: 14,
            lineNumbers: "on",
            roundedSelection: false,
            scrollBeyondLastLine: false,
            wordWrap: "on",
            tabSize: 4,
            insertSpaces: true,
            glyphMargin: false,
            folding: true,
            renderLineHighlight: "all"
          });

          resolve();
        });
      });
    }

    function sendToConsole(message) {
      if (!consoleFrame.contentWindow) {
        status.textContent = "Consola no disponible";
        return false;
      }

      consoleFrame.contentWindow.postMessage(message, bridgeOrigin);
      return true;
    }

    async function runCode() {
      if (!monacoEditor) return;
      const code = monacoEditor.getValue();
      if (!code.trim()) return;

      if (!consoleReady) {
        status.textContent = "Esperando consola...";
      }

      const ok = sendToConsole({ type: "duo-exec", code });
      if (ok) {
        status.textContent = "Bloque enviado a la consola";
      }
    }

    window.addEventListener("message", (event) => {
      if (event.origin !== bridgeOrigin) return;
      const data = event.data || {};

      if (data.type === "duo-ready") {
        consoleReady = true;
        status.textContent = "Consola conectada";
      } else if (data.type === "duo-exec-done") {
        status.textContent = data.ok ? "Ejecucion completada" : "Error en consola";
      } else if (data.type === "duo-reset-done") {
        status.textContent = "Runtime reiniciado";
      }
    });

    runBtn.addEventListener("click", runCode);
    clearBtn.addEventListener("click", () => {
      sendToConsole({ type: "duo-clear" });
      status.textContent = "Consola limpiada";
    });

    resetBtn.addEventListener("click", () => {
      sendToConsole({ type: "duo-reset" });
      status.textContent = "Reiniciando runtime...";
    });

    copyBtn.addEventListener("click", async () => {
      if (!monacoEditor) return;
      await navigator.clipboard.writeText(monacoEditor.getValue());
      status.textContent = "Codigo copiado";
      setTimeout(() => { status.textContent = consoleReady ? "Consola conectada" : "Esperando consola..."; }, 1200);
    });

    openConsoleBtn.addEventListener("click", () => {
      window.open(consoleFrame.src, "_blank", "noopener,noreferrer");
    });

    window.addEventListener("keydown", async (e) => {
      if (e.ctrlKey && e.key === "Enter") {
        e.preventDefault();
        await runCode();
      }
    });

    status.textContent = "Cargando editor...";
    await setupEditor();
    status.textContent = "Esperando consola...";
  </script>
</body>
</html>
