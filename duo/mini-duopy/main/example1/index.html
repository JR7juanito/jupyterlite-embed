<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>main/example1</title>
  <script>
    (function () {
      const payload = {
        title: "Ejemplo 1",
        slug: "main/example1",
        code: "print('Ejemplo 1')\n\n2 + 3"
      };
      const bytes = new TextEncoder().encode(JSON.stringify(payload));
      let binary = "";
      for (const byte of bytes) binary += String.fromCharCode(byte);
      const token = btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      window.location.replace(`../../play.html#state=${token}`);
    })();
  </script>
</head>
<body></body>
</html>
