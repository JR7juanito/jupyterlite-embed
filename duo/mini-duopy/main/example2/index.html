<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>main/example2</title>
  <script>
    (function () {
      const payload = {
        title: "Ejemplo 2",
        slug: "main/example2",
        code: "def saludo(nombre):\n    return f'Hola, {nombre}'\n\nsaludo('Duo')"
      };
      const bytes = new TextEncoder().encode(JSON.stringify(payload));
      let binary = "";
      for (const byte of bytes) binary += String.fromCharCode(byte);
      const token = btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      window.location.replace(`../../play.html#state=${token}`);
    })();
  </script>
</head>
<body></body>
</html>
